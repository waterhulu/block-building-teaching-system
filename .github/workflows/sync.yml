name: Sync to RAG Knowledge Base

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install chromadb sentence-transformers
          
      - name: Run RAG sync
        run: python scripts/sync_rag.py
        
      - name: Upload sync state
        uses: actions/upload-artifact@v4
        with:
          name: sync-state
          path: .sync_state.json
          
  notify:
    needs: sync
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Download sync state
        uses: actions/download-artifact@v4
        with:
          name: sync-state
          
      - name: Display sync results
        run: |
          echo "📊 RAG同步完成"
          cat .sync_state.json
